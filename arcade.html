<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>20101019 우지윤 - ARCADE</title>
	<style>
		html{font-family: 'inter'; scroll-behavior: smooth; color: #F9FFFD; overflow: hidden;}
		nav{position: fixed; width: 100%; z-index: 100; padding-top: 40px; padding-bottom: 100px; background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, transparent 100%);}
		body,h1,h2,p,ul,li{margin:0; padding:0;}
		body{background-color: #040E20;}
		.contents{width: 1100px; margin:auto;}
		ul{width: 800px;}
		li{list-style-type: none;}
		.flex{display: flex; justify-content: center; align-items: center; position: relative; gap: 150px;}
		.logo{position: absolute; left: 20px; top: 50%; transform: translateY(-50%);}
		
		.menu a{display: block; padding: 10px; text-decoration: none; color: #F9FFFD; text-shadow: 0 0 10px #99F8FA,0 0 20px #99F8FA; font-weight: 600; font-size: 1.5rem; opacity: 0.4; transition: opacity 0.3s ease;}
		.menu a.active {opacity: 1 !important;}
		.menu a:hover {opacity: 1;}
		.logo a{display: block; padding: 10px; text-decoration: none; color: #F9FFFD; text-shadow: 0 0 10px #FFFFFF,0 0 20px #FFFFFF; font-weight: 600; font-size: 2.5rem;}

		.game-screen {height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding-top: 110px; padding-bottom: 50px; box-sizing: border-box;}

		.carousel-container {position: relative; width: 100vw; flex-grow: 1; display: flex; justify-content: center; align-items: center;}

		.machine {position: absolute; width: 400px; height: 60vh; display: flex; justify-content: center; align-items: center; transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease-out, filter 0.5s ease-out;}

		.machine img {max-width: 100%; max-height: 100%; object-fit: contain; filter: grayscale(80%); transition: filter 0.5s;}

		.machine.active img {filter: grayscale(0%) drop-shadow(0 0 20px rgba(153, 248, 250, 0.7));}

		.rhythm-section {width: 100%; display: flex; flex-direction: column; align-items: center;}

		.instruction-text {font-size: 1.3rem; font-weight: 600; color: #99F8FA; margin-bottom: 40px; text-shadow: 0 0 10px #99F8FA,0 0 20px #99F8FA; letter-spacing: 1px; opacity: 60%;}

		.rhythm-bar {width: 800px; height: 120px; position: relative; display: flex; justify-content: center; align-items: center; border-top: 2px solid rgba(255, 255, 255, 0.1); border-bottom: 2px solid rgba(255, 255, 255, 0.1); overflow: hidden;}

		.heart-icon {position: absolute; z-index: 5; width: 50px; height: 50px; animation: heartbeat 0.8s infinite;}

		@keyframes heartbeat {
			0% { transform: scale(1); }
			15% { transform: scale(1.3); filter: drop-shadow(0 0 15px red); }
			30% { transform: scale(1); }
			100% { transform: scale(1); }
		}

		.beat-line {position: absolute; width: 4px;
			height: 80px; background-color: #99F8FA; box-shadow: 0 0 10px #99F8FA, 0 0 20px #99F8FA; top: 50%; transform: translateY(-50%); border-radius: 2px;}

		.line-left {animation: moveLeftLine 1.6s linear infinite;}
		.line-left.delay {animation-delay: 0.8s;}
		.line-right {animation: moveRightLine 1.6s linear infinite;}
		.line-right.delay {animation-delay: 0.8s;}

		@keyframes moveLeftLine { 0% {left: 0%; opacity: 0;} 10% {opacity: 1;} 50% {left: 50%; opacity: 1;} 51% {left: 50%; opacity: 0;} 100% {left: 50%; opacity: 0;} }
		@keyframes moveRightLine { 0% {right: 0%; opacity: 0;} 10% {opacity: 1;} 50% {right: 50%; opacity: 1;} 51% {right: 50%; opacity: 0;} 100% {right: 50%; opacity: 0;} }

		.judgment-text {position: absolute; top: 20px; font-size: 2rem; font-weight: bold; opacity: 0; z-index: 10; transition: opacity 0.2s, transform 0.2s; transform: translateY(10px);}

		.judgment-text.show { opacity: 1; transform: translateY(-20px); }
		.perfect { color: #00FF00; text-shadow: 0 0 15px #00FF00; }
		.miss { color: #FF0000; text-shadow: 0 0 15px #FF0000; }

		@keyframes shake { 0% {transform: translateX(0);} 25% {transform: translateX(-10px);} 50% {transform: translateX(10px);} 75% {transform: translateX(-10px);} 100% {transform: translateX(0);} }
		.shake-screen { animation: shake 0.3s; }
	</style>
</head>

<body>
<nav>
	<div class="flex">
		<div class="logo">
			<a href="index.html">Ride on Rythm</a> </div>
	<ul class="contents menu flex">
		<li><a href="about.html">ABOUT</a></li>
		<li><a href="online.html">ONLINE</a></li>
		<li><a href="arcade.html" class="active">ARCADE</a></li>
	</ul>
</nav>

<main class="game-screen">
	<div class="carousel-container">
		<div class="machine" id="m-pump"><img src="./img/pumpitup.png"></div>
		<div class="machine" id="m-gitadora"><img src="./img/gitadora.png"></div>
		<div class="machine" id="m-chunithm"><img src="./img/chunithm.png"></div>
		<div class="machine" id="m-taiko"><img src="./img/taiko.png"></div>
		<div class="machine" id="m-jubeat"><img src="./img/jubeat.png"></div>
		<div class="machine" id="m-sdvx"><img src="./img/soundvoltex.png"></div>
		<div class="machine" id="m-sdvx"><img src="./img/maimai.png"></div>
	</div>

	<div class="rhythm-section">
		<p class="instruction-text">방향키를 눌러 선택하고 박자에 맞춰 엔터!</p>

		<div class="rhythm-bar">
			<div class="judgment-text" id="judgment">PERFECT!</div>

			<div class="beat-line line-left"></div>
			<div class="beat-line line-left delay"></div>
			
			<img src="./img/heart.png" class="heart-icon" alt="Heart">

			<div class="beat-line line-right"></div>
			<div class="beat-line line-right delay"></div>
		</div>
	</div>
</main>

<script>
	const machines = document.querySelectorAll('.machine');
	const judgmentText = document.getElementById('judgment');
	
	// 0번(Pump It Up)부터 시작합니다. (가장 왼쪽 기기가 중앙에 옴)
	let currentIndex = 0; 
	// 각 기기 선택 시 이동할 페이지 목록
	const pages = ['pump.html', 'gitadora.html', 'chunithm.html', 'taiko.html', 'jubeat.html', 'snvt.html', 'maimai.html']; 

	const BEAT_INTERVAL = 800; 
	const TOLERANCE = 150; 
	let startTime = Date.now();

	// 핵심 로직: 기기들의 크기, 위치, 투명도 계산 및 재배치
	function updateCarousel() {
		machines.forEach((machine, index) => {
			const offset = index - currentIndex; 
			const absOffset = Math.abs(offset); 

			let scale = 1;
			let opacity = 0;
			let translateX = 0;
			let zIndex = 100 - absOffset; 

			if (absOffset === 0) {
				scale = 1.15;
				opacity = 1;
				translateX = 0;
				machine.classList.add('active');
			} else {
				machine.classList.remove('active');
				
				// 양옆 최대 3개까지만 보이고 투명도(50%, 30%, 10%) 적용
				if (absOffset === 1) {
					scale = 0.85;
					opacity = 0.5; // 50%
					translateX = offset > 0 ? 320 : -320; // 오른쪽은 +, 왼쪽은 -
				} else if (absOffset === 2) {
					scale = 0.65;
					opacity = 0.3; // 30%
					translateX = offset > 0 ? 550 : -550;
				} else if (absOffset === 3) {
					scale = 0.45;
					opacity = 0.1; // 10%
					translateX = offset > 0 ? 730 : -730;
				} else {
					// 3개를 초과하면 보이지 않음
					scale = 0.3;
					opacity = 0;
					translateX = offset > 0 ? 900 : -900;
				}
			}

			machine.style.transform = `translateX(${translateX}px) scale(${scale})`;
			machine.style.opacity = opacity;
			machine.style.zIndex = zIndex;
		});
	}

	// 페이지가 켜지자마자 기기 위치 초기화
	updateCarousel();

	// 키보드 입력 감지
	window.addEventListener('keydown', (e) => {
		if(["ArrowLeft","ArrowRight","Enter"].indexOf(e.key) > -1) {
			e.preventDefault(); // 스크롤 방지
		}

		if (e.key === 'ArrowLeft') {
			currentIndex = Math.max(0, currentIndex - 1);
			updateCarousel();
		} 
		else if (e.key === 'ArrowRight') {
			currentIndex = Math.min(machines.length - 1, currentIndex + 1);
			updateCarousel();
		} 
		else if (e.key === 'Enter') {
			checkRhythm();
		}
	});

	// 리듬 판정(Hit/Miss)
	function checkRhythm() {
		const now = Date.now();
		const phase = (now - startTime) % BEAT_INTERVAL; 
		const isPerfect = (phase < TOLERANCE) || (phase > BEAT_INTERVAL - TOLERANCE);

		judgmentText.className = 'judgment-text';
		
		setTimeout(() => {
			if (isPerfect) {
				judgmentText.innerText = "PERFECT!";
				judgmentText.classList.add('show', 'perfect');
				setTimeout(() => {
					window.location.href = pages[currentIndex];
				}, 600);
			} else {
				judgmentText.innerText = "MISS!";
				judgmentText.classList.add('show', 'miss');
				document.body.classList.add('shake-screen');
				setTimeout(() => {
					document.body.classList.remove('shake-screen');
				}, 300);
			}
		}, 10);
	}
</script>
</body>
</html>
